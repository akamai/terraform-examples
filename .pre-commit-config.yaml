repos:
  - repo: local
    hooks:
      # Hook 1: Seed every .tf-containing folder (except tools/ and snippets/) with the root
      # .terraform-docs.yaml as the default config. Flat examples (e.g. datastream/, edgedns/)
      # rely on this copy since they don't have their own config. Parent-level directories for
      # the modules+example pattern (e.g. products/client-lists/) are NOT affected here because
      # they contain no .tf files themselves, so their custom .terraform-docs.yaml is preserved.
      - id: copy-terraform-docs-config
        name: Copy terraform-docs config to module folders
        entry: >
          pwsh -NoProfile -Command "
          Get-ChildItem -Recurse -Include *.tf |
            Select-Object -ExpandProperty Directory |
            Sort-Object -Unique |
            Where-Object {
              $_ -notmatch '^\.$' -and
              $_ -notmatch '/tools(/|$)' -and
              $_ -notmatch '/snippets(/|$)'
            } |
            ForEach-Object {
              Copy-Item -Path ./.terraform-docs.yaml -Destination (Join-Path $_ '.terraform-docs.yaml') -Force
            }
          "
        language: system
        pass_filenames: false

      # Hook 2: Run terraform-docs in every .tf-containing directory (except tools/ and snippets/).
      # Covers two cases:
      #   - Flat examples (e.g. datastream/, edgedns/): all .tf files in one directory; uses the
      #     default config copied by Hook 1 and generates a README with auto-listed variables.
      #   - Subdirectories of the modules+example pattern (e.g. client-lists/modules/,
      #     client-lists/example/): docs are generated here too, but the authoritative parent
      #     README for these products is produced by Hook 3.
      - id: terraform-docs
        name: Generate Terraform docs
        entry: >
          pwsh -NoProfile -Command "
          Get-ChildItem -Recurse -Include *.tf |
            Select-Object -ExpandProperty Directory |
            Sort-Object -Unique |
            Where-Object {
              $_ -notmatch '/tools(/|$)' -and
              $_ -notmatch '/snippets(/|$)'
            } |
            ForEach-Object {
              & terraform-docs $_
            }
          "
        language: system
        pass_filenames: false

      # Hook 3: Handle examples that follow a modules/ + example/ folder pattern.
      # For each listed path (always an example/ subdirectory), terraform-docs is invoked with:
      #   --config  -> the parent directory's custom .terraform-docs.yaml, which pulls the doc
      #                header from modules/main.tf and embeds the example code via include.
      #   --output-file=../README.md -> writes the result to the parent directory's README,
      #                not into the example/ folder itself.
      # To add a new modules+example product, append its example/ path to the $paths array
      # and ensure the parent directory has a custom .terraform-docs.yaml.
      - id: generate-specific-terraform-docs
        name: Generate Terraform docs for specific modules
        entry: >
          pwsh -NoProfile -Command "
          $paths = @(
            './products/client-lists/example',
            './products/certificates/domain-validation/example',
            './products/certificates/third-party/example',
            './products/cloudlets/edge-redirector-csv/example',
            './products/property/hostname-buckets/example',
            './products/property/saas-provider/example'
          );
          foreach ($path in $paths) {
            $configPath = Join-Path (Split-Path $path -Parent) '.terraform-docs.yaml';
            & terraform-docs --output-file=../README.md --config=$configPath $path;
          }
          "
        language: system
        pass_filenames: false

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: "v1.98.1"
    hooks:
      - id: terraform_fmt
        args: [--args=-write=true]